name: Auto bump patch version

# Erhöht bei jedem Push auf main automatisch ``PACKAGE_VERSION`` in
# ``app/core/config.py`` um eine Patch-Stufe und schreibt das Ergebnis
# als zusätzlichen Commit ("chore: bump version to X.Y.Z [skip-bump]")
# zurück ins Repository. Der Marker ``[skip-bump]`` verhindert eine
# rekursive Endlosschleife.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: >
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip-bump]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump PACKAGE_VERSION (patch)
        id: bump
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import re

          path = pathlib.Path("app/core/config.py")
          src = path.read_text(encoding="utf-8")
          pattern = re.compile(r'^(PACKAGE_VERSION\s*=\s*")(\d+)\.(\d+)\.(\d+)(")', re.MULTILINE)
          match = pattern.search(src)
          if match is None:
              raise SystemExit("PACKAGE_VERSION not found in app/core/config.py")
          major, minor, patch = int(match[2]), int(match[3]), int(match[4])
          old_version = f"{major}.{minor}.{patch}"
          new_version = f"{major}.{minor}.{patch + 1}"
          path.write_text(pattern.sub(rf'\g<1>{new_version}\5', src, count=1), encoding="utf-8")
          print(f"old_version={old_version}")
          print(f"new_version={new_version}")
          PY

      - name: Commit & push bumped version
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          OLD_VERSION: ${{ steps.bump.outputs.old_version }}
        run: |
          if git diff --quiet -- app/core/config.py; then
            echo "Keine Änderung an PACKAGE_VERSION – nichts zu committen."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/core/config.py
          git commit -m "chore: bump version ${OLD_VERSION} -> ${NEW_VERSION} [skip-bump]"
          git push origin HEAD:${{ github.ref_name }}
